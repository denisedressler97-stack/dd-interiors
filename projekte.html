<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Projekte – Denise Dressler Interiors</title>
    <meta name="description" content="Unsere Projekte – Modernes, elegantes Interior Design – Denise Dressler Interiors." />

    <meta property="og:description" content="Unsere Projekte – Modernes, elegantes Interior Design – Denise Dressler Interiors." />

  </head>

  <body class="projekte-page">

    <header id="header"></header>

    <main>

    <section class="projekte" id="projekte">
      <div class="container">

        <div class="projekte__berlin">
          <div class="projekte__berlin-left">
            <h2 class="projekte__heading">PROJEKTE</h2>
            <p class="projekte__label">Einfamilienhaus in Berlin</p>
            <div class="projekte__img projekte__img--tall">
            <img src="/assets/images/dd-interiors3.JPG" alt="Bild 3" style="width:100%;height:100%;object-fit:cover;display:block;">
            </div>
          </div>
          <div class="projekte__stack">
            <div class="projekte__img projekte__img--stack-top">
              <img src="/assets/images/dd-interiors4.JPG" alt="Bild 4" style="width:100%;height:100%;object-fit:cover;display:block;">
            </div>
            <div class="projekte__stack-row">
              <div class="projekte__img projekte__img--stack-bottom-tall">
                <img src="/assets/images/dd-interiors5.JPG" alt="Bild 5" style="width:100%;height:100%;object-fit:cover;display:block;">
              </div>
              <div class="projekte__stack-row-right-wrap">
                <div class="projekte__stack-row-right">
                  <div class="projekte__img projekte__img--stack-bottom">
                    <img src="/assets/images/dd-interiors6.JPG" alt="Bild 6" style="width:100%;height:100%;object-fit:cover;display:block; object-position: 30% center;">
                  </div>
                  <div class="projekte__img projekte__img--stack-bottom">
                    <img src="/assets/images/dd-interiors7.JPG" alt="Bild 7" style="width:100%;height:100%;object-fit:cover;display:block; object-position: 30% center;">
                  </div>
                </div>
                <a href="#" class="projekte__mehr-btn">mehr sehen →</a>
              </div>
            </div>
          </div>
        </div>

        <div class="projekte__item">
          <p class="projekte__label">Apartment in Paris</p>
          <div class="projekte__grid projekte__grid--2col">
            <div class="projekte__img projekte__img--paris-left"></div>
            <div class="projekte__stack projekte__stack--2x2">
              <div class="projekte__img projekte__img--paris-tl"></div>
              <div class="projekte__img projekte__img--paris-tr"></div>
              <div class="projekte__img projekte__img--paris-bl"></div>
              <div class="projekte__img projekte__img--paris-br"></div>
            </div>
          </div>
          <div class="projekte__fullscreen">
            <div class="projekte__img projekte__img--paris-full"></div>
            <blockquote class="projekte__quote">Für alle, die mehr fühlen wollen und Schönheit im Detail schätzen: Unser Interior bringt stilvollen Luxus in dein Leben</blockquote>
          </div>
        </div>

      </div>
    </section>

    </main>

    <div id="badge"></div>

    <div id="footer"></div>

    <script src="js/main.js"></script>
